esphome:
  name: cambridge-esp-controller
  friendly_name: Cambridge CXA81 Controller
  on_boot:
    priority: -100
    then:
      - delay: 10s
      - script.execute: cxa81_query_state

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: DEBUG
  baud_rate: 0

captive_portal:

api:

ota:
  - platform: esphome
    password: "39821c578c482334adf60a17769ed78d"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Cambridge-Esp-Controller"
    password: "1G26arUkEBO8"

globals:
  - id: uart_buffer
    type: std::string
    restore_value: no
    initial_value: ""
  - id: manchester_code
    type: std::string
    initial_value: '"0"'

output:
  - platform: gpio
    pin: 21
    id: controlbus_out

uart:
  id: cxa_uart
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 9600
  parity: NONE
  stop_bits: 1
  data_bits: 8
  debug:
    direction: RX
    dummy_receiver: true
    after:
      delimiter: "\r"
    sequence:
      - lambda: |-
          std::string str(bytes.begin(), bytes.end());
          ESP_LOGD("CXA81", "RX raw: %s", str.c_str());
          id(rawString).publish_state(str.c_str());

          if (str.empty() || str[0] != '#')
            return;

          int dev = 0;
          int cmd = 0;
          int val = 0;

          if (sscanf(str.c_str(), "#%02x,%02x,%02x", &dev, &cmd, &val) != 3)
            return;

          /* ================= ERROR HANDLING ================= */
          // #00,01 / #00,02 / #00,03 / #00,04
          if (dev == 0x00) {
            const char* err = nullptr;

            switch (cmd) {
              case 0x01:
                err = "Command Group invalid";
                break;
              case 0x02:
                err = "Command Number invalid";
                break;
              case 0x03:
                err = "Command Data out of range";
                break;
              case 0x04:
                err = "Command not available";
                break;
              default:
                err = "Unknown protocol error";
                break;
            }

            ESP_LOGE("CXA81", "Protocol error RX: %s", err);

            id(cxa81_last_error).publish_state(err);
            id(cxa81_error_active).publish_state(true);

            return;
          }

          if (str.size() < 8)
          return;  // minden más rövid üzenet átugor

          /* ================= VERSION INFO ================= */
          // #14,01,<string>  → Protocol version
          // #14,02,<string>  → Firmware version
          if (dev == 0x14) {

            // Keressük meg a harmadik mezőt (második vessző után)
            size_t p1 = str.find(',');
            size_t p2 = str.find(',', p1 + 1);

            if (p1 == std::string::npos || p2 == std::string::npos)
              return;

            std::string value = str.substr(p2 + 1);

            // trim CR/LF ha maradt
            while (!value.empty() && (value.back() == '\r' || value.back() == '\n'))
              value.pop_back();

            if (cmd == 0x01) {
              ESP_LOGI("CXA81", "Protocol version RX: %s", value.c_str());
              id(cxa81_protocol_version).publish_state(value.c_str());
              id(cxa81_error_active).publish_state(false);
              return;
            }

            if (cmd == 0x02) {
              ESP_LOGI("CXA81", "Firmware version RX: %s", value.c_str());
              id(cxa81_firmware_version).publish_state(value.c_str());
              id(cxa81_error_active).publish_state(false);
              return;
            }
          }

          /* ================= POWER STATE ================= */
          // #02,01,00 / #02,01,01
          if (dev == 0x02 && cmd == 0x01) {
            bool power_on = (val == 0x01);
            ESP_LOGI(
              "CXA81",
              "Power state RX: %s",
              power_on ? "ON" : "OFF"
            );
            id(cxa_power_switch).publish_state(power_on);
            return;
          }

          /* ================= MUTE STATE ================= */
          // #02,03,00 / #02,03,01
          if (dev == 0x02 && cmd == 0x03) {
            bool mute_on = (val == 0x01);
            ESP_LOGI(
              "CXA81",
              "Mute state RX: %s",
              mute_on ? "ON" : "OFF"
            );
            id(cxa_mute_switch).publish_state(mute_on);
            return;
          }
          
          /* ============== INPUT SELECT (korábbi) ============== */
          if (dev == 0x04 && cmd == 0x01) {
            const char* input = nullptr;
            switch (val) {
              case 0x00: input = "A1"; break;
              case 0x01: input = "A2"; break;
              case 0x02: input = "A3"; break;
              case 0x03: input = "A4"; break;
              case 0x04: input = "D1"; break;
              case 0x05: input = "D2"; break;
              case 0x06: input = "D3"; break;
              case 0x14: input = "Bluetooth"; break;
              case 0x16: input = "USB Audio"; break;
              case 0x20: input = "A1 Balanced"; break;
              default:
                ESP_LOGW("CXA81", "Unknown input code: 0x%02X", val);
                return;
            }
            ESP_LOGI("CXA81", "Input RX: %s", input);
            id(cxa81_input).publish_state(input);
          }

binary_sensor:
  - platform: template
    name: "CXA81 Error"
    id: cxa81_error_active
    device_class: problem

text_sensor:
  - platform: template
    name: "Raw String"
    id: "rawString"
  - platform: template
    name: "CXA81 Last Error"
    id: cxa81_last_error
  - platform: template
    name: "CXA81 Protocol Version"
    id: cxa81_protocol_version
  - platform: template
    name: "CXA81 Firmware Version"
    id: cxa81_firmware_version

switch:
  - platform: template
    name: "CXA81 Power"
    id: cxa_power_switch
    optimistic: false
    turn_on_action:
      - logger.log: "CXA81 → POWER ON (TX)"
      - uart.write: "#01,02,01\r"
    turn_off_action:
      - logger.log: "CXA81 → POWER OFF (TX)"
      - uart.write: "#01,02,00\r"
  - platform: template
    name: "CXA81 Mute"
    id: cxa_mute_switch
    optimistic: false
    turn_on_action:
      - logger.log: "CXA81 → MUTE (TX)"
      - uart.write: "#01,04,01\r"
    turn_off_action:
      - logger.log: "CXA81 → UNMUTE (TX)"
      - uart.write: "#01,04,00\r"

button:
  - platform: template
    name: "CXA - Volume Down"
    on_press:
      - lambda: |-
          id(manchester_code) = "11010000010001";
      - script.execute: send_manchester
  - platform: template
    name: "CXA - Volume Up"
    on_press:
      - lambda: |-
          id(manchester_code) = "11010000010000";
      - script.execute: send_manchester
      
  - platform: template
    name: "CXA81 Refresh State"
    icon: "mdi:refresh"
    on_press:
      - script.execute: cxa81_query_state
# =========================
# Cambridge INPUT SELECT
# =========================
select:
  - platform: template
    name: "CXA81 Input"
    id: cxa81_input
    optimistic: false
    options:
      - "A1"
      - "A2"
      - "A3"
      - "A4"
      - "D1"
      - "D2"
      - "D3"
      - "Bluetooth"
      - "USB Audio"
      - "A1 Balanced"
    set_action:
      - lambda: |-
          uint8_t code = 0x00;  // alap érték

          if (x == "A1") code = 0x00;
          else if (x == "A2") code = 0x01;
          else if (x == "A3") code = 0x02;
          else if (x == "A4") code = 0x03;
          else if (x == "D1") code = 0x04;
          else if (x == "D2") code = 0x05;
          else if (x == "D3") code = 0x06;
          else if (x == "Bluetooth") code = 0x14;
          else if (x == "USB Audio") code = 0x16;
          else if (x == "A1 Balanced") code = 0x20;

          char cmd[16];
          snprintf(cmd, sizeof(cmd), "#03,04,%02X\r", code);
          ESP_LOGI("CXA81", "Input select: %s", cmd);
          id(cxa_uart).write_str(cmd);

# DHT11 szenzor (GPIO4-re)
sensor:
  - platform: dht
    pin: GPIO4
    model: DHT11
    temperature:
      name: "CXA81 Hőmérséklet"
      id: room_temp
      filters:
      - sliding_window_moving_average:
          window_size: 6
          send_every: 4
    humidity:
      name: "CXA81 Páratartalom"
      id: room_humidity
      filters:
      - sliding_window_moving_average:
          window_size: 5
          send_every: 10
    update_interval: 10s

script:
  - id: cxa81_query_state
    mode: queued
    then:
      # --- Power state ---
      - logger.log: "CXA81 → Query POWER state"
      - uart.write: "#01,02\r"
      - delay: 200ms

      # --- Mute state ---
      - logger.log: "CXA81 → Query MUTE state"
      - uart.write: "#01,04\r"
      - delay: 200ms

      # --- Current input/source ---
      - logger.log: "CXA81 → Query INPUT state"
      - uart.write: "#03,01\r"
      - delay: 200ms

      # --- Protocol version ---
      - logger.log: "CXA81 → Query PROTOCOL version"
      - uart.write: "#13,01\r"
      - delay: 200ms

      # --- Firmware version ---
      - logger.log: "CXA81 → Query FIRMWARE version"
      - uart.write: "#13,02\r"

  - id: send_manchester
    mode: queued
    then:
      - lambda: |-
          const int halfbit_us = 875;

          auto send_halfbit = [&](bool level) {
            id(controlbus_out).set_state(level);
            delayMicroseconds(halfbit_us);
          };

          // idle = LOW
          id(controlbus_out).set_state(false);
          delayMicroseconds(halfbit_us);

          const std::string &bits = id(manchester_code);

          for (char c : bits) {
            if (c == '0') {
              send_halfbit(true);   // H
              send_halfbit(false);  // L
            } else if (c == '1') {
              send_halfbit(false);  // L
              send_halfbit(true);   // H
            }
          }

          // vissza idle
          id(controlbus_out).set_state(false);
