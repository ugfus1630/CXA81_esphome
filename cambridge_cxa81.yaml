esphome:
  name: cxa81_rs232
  platform: ESP32
  board: esp32dev
  includes:
    - custom_components/cxa_rs232/cxa_rs232.h

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "CXA81-ESP32"
    password: "12345678"

logger:
  level: DEBUG

api:
  encryption:
    key: "YOUR_API_KEY_HERE"

ota:
  password: "YOUR_OTA_PASSWORD"

uart:
  id: cxa_uart
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 9600
  parity: NONE
  stop_bits: 1

# Custom component
custom_component:
  - lambda: |-
      auto *amp = new CXARS232(id(cxa_uart));
      amp->power_sensor = new Sensor();
      amp->mute_sensor = new Sensor();
      amp->source_sensor = new Sensor();
      return {amp};

# Switch: Power
switch:
  - platform: template
    name: "CXA81 Power"
    turn_on_action:
      - lambda: |-
          auto amp = (CXARS232*)id(cxa_uart).get_custom_component();
          amp->send_power(true);
    turn_off_action:
      - lambda: |-
          auto amp = (CXARS232*)id(cxa_uart).get_custom_component();
          amp->send_power(false)

# Switch: Mute
  - platform: template
    name: "CXA81 Mute"
    turn_on_action:
      - lambda: |-
          auto amp = (CXARS232*)id(cxa_uart).get_custom_component();
          amp->send_mute(true);
    turn_off_action:
      - lambda: |-
          auto amp = (CXARS232*)id(cxa_uart).get_custom_component();
          amp->send_mute(false)

# Select: Input source
select:
  - platform: template
    name: "CXA81 Source"
    options: ["00","01","02","03","04","05","06","14","16","20"]
    set_action:
      - lambda: |-
          auto amp = (CXARS232*)id(cxa_uart).get_custom_component();
          amp->send_source(atoi(x.c_str()));

# Sensors
sensor:
  - platform: custom
    lambda: |-
      auto amp = (CXARS232*)id(cxa_uart).get_custom_component();
      return {amp->power_sensor, amp->mute_sensor, amp->source_sensor};
    sensors:
      - name: "CXA81 Power State"
      - name: "CXA81 Mute State"
      - name: "CXA81 Source Code"
